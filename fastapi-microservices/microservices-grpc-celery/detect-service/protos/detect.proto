syntax = "proto3";

package detect;

message TestRequest {
    string msg = 1;
}

message TestResponse {
    string msg = 1;
}

message EvenListRequest {
    repeated int32 numList = 1;
}

message EvenListResponse {
    repeated int32 evenList = 1;
}

service DetectService {
    rpc TestMethod(TestRequest) returns (TestResponse);
    rpc calculateEven(EvenListRequest) returns (EvenListResponse);
}