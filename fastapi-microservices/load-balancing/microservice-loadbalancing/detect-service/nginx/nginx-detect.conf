events {}
 
http {
    upstream detect_backend {
        server detect-service-1:8080 weight=5;
        server detect-service-2:8080 weight=5;
    }
 
    server {
        listen 80;
        location / {
        proxy_pass http://detect_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}