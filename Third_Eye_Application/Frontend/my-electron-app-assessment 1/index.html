<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Electron Assessment Embed</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 20px;
      }
      h1 {
        color: #2c3e50;
        margin: 0;
      }
      #controls {
        display: flex;
        gap: 8px;
      }
      button {
        padding: 10px 18px;
        border: none;
        background-color: #3498db;
        color: white;
        font-size: 14px;
        border-radius: 6px;
        cursor: pointer;
      }
      #activity {
        margin-top: 12px;
        width: 100%;
        max-width: 900px;
        min-height: 120px;
        border: 1px solid #ddd;
        padding: 12px;
        border-radius: 8px;
        background: #fafafa;
        overflow: auto;
      }
      .act {
        margin-bottom: 8px;
        font-size: 13px;
      }
      .muted {
        color: #666;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Electron Assessment Embed</h1>

    <div id="controls">
      <button id="testBtn">Open HackerRank (embed)</button>
      <button id="customBtn">Open specific assessment</button>
    </div>

    <div id="activity">
      <div class="muted">
        Activity log will appear here when the assessment window navigates or
        loads.
      </div>
    </div>

    <script>
      const testBtn = document.getElementById("testBtn");
      const customBtn = document.getElementById("customBtn");
      const activity = document.getElementById("activity");

      function logActivity(obj) {
        const d = new Date().toLocaleString();
        const node = document.createElement("div");
        node.className = "act";
        node.innerText = `[${d}] ${obj.type}: ${
          obj.url ? obj.url : obj.title ? obj.title : ""
        }`;
        activity.prepend(node);
      }

      // Register for activity messages from main
      if (window.myAPI && window.myAPI.onActivity) {
        window.myAPI.onActivity((data) => {
          logActivity(data);
        });
      }

      testBtn.addEventListener("click", async () => {
        // Open default HackerRank homepage
        await window.myAPI.openAssessment({
          url: "https://guru.relevantz.com/course/view.php?id=135",
        });
      });

      customBtn.addEventListener("click", async () => {
        // Example: open a more specific HackerRank URL (replace with a real assessment link if you have one)
        const sample = "https://leetcode.com/";
        await window.myAPI.openAssessment({ url: sample });
      });
    </script>
  </body>
</html>
