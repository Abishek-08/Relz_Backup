<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>DOM Event Capture Demo (Fixed)</title>
    <style>
      body {
        display: flex;
        flex-direction: column;
        height: 100vh;
        margin: 0;
        font-family: sans-serif;
      }
      #log {
        height: 120px;
        background: #111;
        color: #0f0;
        overflow-y: auto;
        padding: 10px;
        font-size: 12px;
      }
      webview {
        flex: 1;
        border: 1px solid #ccc;
      }
    </style>
  </head>
  <body>
    <div id="log">Logs:</div>
    <!-- Use relative preload path that points to the file in the app folder -->
    <webview
      id="thirdPartyView"
      src="./thirdparty.html"
      preload="./thirdparty-preload.js"
    ></webview>

    <script src="./renderer.js"></script>
  </body>
</html>
