image:
  registry: docker.io
  repository: library/cassandra
  tag: 4.1.3-debian-12-r13
  pullPolicy: IfNotPresent

metrics:
  enabled: true # Enables prometheus-jmx-exporter
  serviceMonitor:
    enabled: false # Disable because you don't have CRDs or don't want errors

dbUser:
  user: cassandra
  password: cassandra

resources:
  requests:
    cpu: 200m
    memory: 512Mi

global:
  security:
    allowInsecureImages: true
