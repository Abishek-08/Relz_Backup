apiVersion: v1
kind: Namespace
metadata:
  name: database
---
# Cassandra Service
apiVersion: v1
kind: Service
metadata:
  name: cassandra
  namespace: database
spec:
  clusterIP: None
  selector:
    app: cassandra
  ports:
    - name: cql
      port: 9042
      targetPort: 9042
    - name: jmx
      port: 7199
      targetPort: 7199
    - name: metrics
      port: 5556
      targetPort: 5556
---
# Cassandra StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cassandra
  namespace: database
spec:
  serviceName: cassandra
  replicas: 1
  selector:
    matchLabels:
      app: cassandra
  template:
    metadata:
      labels:
        app: cassandra
    spec:
      containers:
        # ------------------------
        # Cassandra main container
        # ------------------------
        - name: cassandra
          image: cassandra:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: CASSANDRA_CLUSTER_NAME
              value: "k8s-cluster"
            - name: CASSANDRA_PASSWORD_SEEDER
              value: "yes"
            - name: CASSANDRA_PASSWORD
              value: "cassandra"
            - name: CASSANDRA_ENABLE_REMOTE_CONNECTIONS
              value: "true"
            - name: MAX_HEAP_SIZE
              value: "512M"
            - name: HEAP_NEWSIZE
              value: "100M"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "1.5Gi"
          ports:
            - containerPort: 9042
              name: cql
            - containerPort: 7199
              name: jmx
          volumeMounts:
            - name: cassandra-data
              mountPath: /bitnami/cassandra

        # ------------------------
        # JMX Exporter sidecar
        # ------------------------
        - name: jmx-exporter
          image: bitnami/jmx-exporter:latest
          args:
            - "5556" # metrics port
            - "/config/jmx.yml" # config file
          ports:
            - containerPort: 5556
              name: metrics
          volumeMounts:
            - name: jmx-config
              mountPath: /config

      volumes:
        - name: jmx-config
          configMap:
            name: cassandra-jmx-config

  volumeClaimTemplates:
    - metadata:
        name: cassandra-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
# ConfigMap for JMX Exporter
apiVersion: v1
kind: ConfigMap
metadata:
  name: cassandra-jmx-config
  namespace: database
data:
  jmx.yml: |
    startDelaySeconds: 0
    lowercaseOutputName: true
    lowercaseOutputLabelNames: true
    jmxUrl: service:jmx:rmi:///jndi/rmi://localhost:7199/jmxrmi
    rules:
      - pattern: '^org.apache.cassandra.metrics<type=(\w+), name=(\w+)><>(Count|Value)$'
        name: cassandra_$1_$2
