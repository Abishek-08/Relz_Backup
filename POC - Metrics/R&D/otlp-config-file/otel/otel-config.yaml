apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observ
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
          http:
      prometheus:
        config:
          scrape_configs:
            - job_name: "redis"
              scrape_interval: 10s
              metrics_path: /metrics
              scheme: http
              static_configs:
                - targets: ["redis-exporter.database.svc.cluster.local:9121"]
            - job_name: "cassandra-jmx"
              scrape_interval: 10s
              metrics_path: /metrics
              scheme: http
              static_configs:
                - targets: ["cassandra-metrics.database.svc.cluster.local:5556"]
            # ---------------------------
            # NGINX Ingress
            # ---------------------------
            - job_name: "nginx-ingress"
              metrics_path: /metrics
              static_configs:
                - targets:
                    - "nginx-ingress-ingress-nginx-controller-metrics.ingress.svc.cluster.local:10254"
            # ---------------------------
            # MongoDB Exporter
            # ---------------------------
            - job_name: "mongodb-exporter"
              static_configs:
                - targets:
                    - "mongo-mongodb-metrics.database.svc.cluster.local:9216"
            # ---------------------------
            # Istio Metrics
            # ---------------------------
            - job_name: "istiod"
              static_configs:
                - targets:
                    - "istiod.istio-system.svc.cluster.local:15014"
            # -------------------------
            # Istio Envoy Stats
            # -------------------------
            - job_name: "istio-ingressgateway"
              metrics_path: /stats/prometheus
              static_configs:
                - targets:
                    ["istio-ingressgateway.istio-system.svc.cluster.local:15090"]

    processors:
      batch:

    exporters:
      prometheus:
        endpoint: "0.0.0.0:9464"
      debug:
        verbosity: detailed

    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          processors: [batch]
          exporters: [prometheus]
          
