apiVersion: v1
kind: Service
metadata:
  name: redis-exporter
  namespace: database
spec:
  selector:
    app: redis-exporter
  ports:
    - port: 9121
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-exporter
  namespace: database
spec:
  selector:
    matchLabels:
      app: redis-exporter
  replicas: 1
  template:
    metadata:
      labels:
        app: redis-exporter
    spec:
      containers:
        - name: redis-exporter
          image: oliver006/redis_exporter:latest
          args:
            - "--redis.addr=redis:6379"
          ports:
            - containerPort: 9121
