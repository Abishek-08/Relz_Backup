apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-service-deployment
  namespace: microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-service
  template:
    metadata:
      labels:
        app: project-service
    spec:
      containers:
        - name: project-service
          image: project-image:1.0
          ports:
            - containerPort: 8082
          
---
apiVersion: v1
kind: Service
metadata:
  name: project-service-svc
  namespace: microservice
spec:
  selector:
    app: project-service
  ports:
    - protocol: TCP
      port: 8082
      targetPort: 8082
  type: NodePort
 