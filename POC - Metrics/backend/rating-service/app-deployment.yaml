apiVersion: apps/v1
kind: Deployment
metadata:
  name: rating-service-deployment
  namespace: microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rating-service
  template:
    metadata:
      labels:
        app: rating-service
    spec:
      containers:
        - name: rating-service
          image: rating-image:1.0
          ports:
            - containerPort: 8084
          
---
apiVersion: v1
kind: Service
metadata:
  name: rating-service-svc
  namespace: microservice
spec:
  selector:
    app: rating-service
  ports:
    - protocol: TCP
      port: 8084
      targetPort: 8084
  type: NodePort
 