apiVersion: apps/v1
kind: Deployment
metadata:
  name: employee-service-deployment
  namespace: microservice
spec:
  replicas: 1
  selector:
    matchLabels:
      app: employee-service
  template:
    metadata:
      labels:
        app: employee-service
    spec:
      containers:
        - name: employee-service
          image: employee-image:1.0
          ports:
            - containerPort: 8081
          
---
apiVersion: v1
kind: Service
metadata:
  name: employee-service-svc
  namespace: microservice
spec:
  selector:
    app: employee-service
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
  type: NodePort
 