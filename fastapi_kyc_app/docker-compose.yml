version: "3.9"

services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  fastapi:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis

  celery_worker:
    build: .
    command: celery -A app.tasks.celery_app worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - redis

  flower:
    build: .
    command: celery -A app.tasks.celery_app flower --port=5555 --basic_auth=user:pass
    ports:
      - "5555:5555"
    depends_on:
      - redis
