apiVersion: apps/v1
kind: Deployment # Kubernetes resource kind we are creating
metadata:
  name: detect-service
spec:
  selector:
    matchLabels:
      app: detect-service
  replicas: 4 # Number of replicas that will be created for this deployment
  template:
    metadata:
      labels:
        app: detect-service
    spec:
      containers:
        - name: detect-service
          image: detect-service-image:1.0 # Image that will be used to containers in the cluster
          imagePullPolicy: IfNotPresent # it will first check the local docker and then it will check the docker hub
          ports:
            - containerPort: 8088 # The port that the container is running on in the cluster

---
apiVersion: v1 # Kubernetes API version
kind: Service # Kubernetes resource kind we are creating
metadata: # Metadata of the resource kind we are creating
  name: detect-service-svc
spec:
  selector:
    app: detect-service
  ports:
    - protocol: "TCP"
      port: 8088 # The port that the service is running on in the cluster
      targetPort: 8088 # The port exposed by the service
  type: NodePort # type of the service.
