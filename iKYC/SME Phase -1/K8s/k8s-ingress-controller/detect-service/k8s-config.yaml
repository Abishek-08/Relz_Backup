apiVersion: apps/v1
kind: Deployment
metadata:
  name: detect-service-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: detect-service
  template:
    metadata:
      labels:
        app: detect-service
    spec:
      containers:
        - name: detect-service
          image: detect-service:1.0
          ports:
            - containerPort: 8081

---
apiVersion: v1
kind: Service
metadata:
  name: detect-service
spec:
  type: ClusterIP
  selector:
    app: detect-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8081
