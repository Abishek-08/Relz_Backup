apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: microservice-gateway
  namespace: istio-routing
spec:
  selector:
    istio: ingressgateway # 👈 Uses the Istio ingress gateway in istio-system
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*" # 👈 accept requests for any host (you can restrict later)
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: microservice-routing
  namespace: istio-routing
spec:
  hosts:
    - "*" # 👈 external host, change to domain if needed
  gateways:
    - microservice-gateway
  http:
    # Rule 1: If header x-user=test -> 100% v2
    - match:
        - headers:
            x-user:
              exact: "test"
      route:
        - destination:
            host: routing-service
            subset: v2

    # Rule 2: Everyone else -> canary rollout (90% v1, 10% v2)
    - route:
        - destination:
            host: routing-service
            subset: v1
          weight: 90
        - destination:
            host: routing-service
            subset: v2
          weight: 10
