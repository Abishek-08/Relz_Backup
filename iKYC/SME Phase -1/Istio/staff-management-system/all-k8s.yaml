# --- Staff Service ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: staff-service
  namespace: istio-staff-microservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: staff-service
      version: v1
  template:
    metadata:
      labels:
        app: staff-service
        version: v1
    spec:
      containers:
        - name: staff-service
          image: staff-service-image:1.0
          ports:
            - containerPort: 8022
          env:
            # DB Host and Name from ConfigMap
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: DB_NAME
            # DB Username and Password from Secret
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secrets
                  key: DB_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: staff-service
  namespace: istio-staff-microservice
spec:
  selector:
    app: staff-service
  ports:
    - name: http
      port: 80 # Service exposed on 80
      targetPort: 8022 # Forwards to pod’s 8022
  type: ClusterIP

---
