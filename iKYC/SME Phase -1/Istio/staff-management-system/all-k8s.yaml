---
# --- Salary Service ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: salary-service
  namespace: istio-staff-microservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: salary-service
      version: v1
  template:
    metadata:
      labels:
        app: salary-service
        version: v1
    spec:
      containers:
        - name: salary-service
          image: salary-service-image:1.0
          ports:
            - containerPort: 8026
          env:
            # DB Host and Name from ConfigMap
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: DB_HOST
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: DB_NAME
            # DB Username and Password from Secret
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secrets
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secrets
                  key: DB_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: salary-service
  namespace: istio-staff-microservice
spec:
  selector:
    app: salary-service
  ports:
    - name: http
      port: 80 # Service exposed on 80
      targetPort: 8026 # Forwards to pod’s 8026
  type: ClusterIP

---
# --- Gateway ---
apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: microservice-gateway
  namespace: istio-staff-microservice
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"

---
# --- VirtualService ---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: microservice-routing
  namespace: istio-staff-microservice
spec:
  hosts:
    - "*"
  gateways:
    - microservice-gateway
  http:
    - match:
        - uri:
            prefix: /staff
      route:
        - destination:
            host: staff-service
            port:
              number: 80
    - match:
        - uri:
            prefix: /department
      route:
        - destination:
            host: department-service
            port:
              number: 80
    - match:
        - uri:
            prefix: /salary
      route:
        - destination:
            host: salary-service
            port:
              number: 80
