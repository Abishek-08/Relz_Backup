apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: istio-microservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-service
      version: v1
  template:
    metadata:
      labels:
        app: inventory-service
        version: v1
    spec:
      containers:
        - name: inventory-service
          image: inventory-service-images:1.0
          ports:
            - containerPort: 8060
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: istio-microservice
spec:
  type: ClusterIP
  selector:
    app: inventory-service
  ports:
    - port: 80
      targetPort: 8060
