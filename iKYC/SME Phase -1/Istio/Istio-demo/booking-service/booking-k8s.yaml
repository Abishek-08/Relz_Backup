apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: istio-microservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: booking-service
      version: v1
  template:
    metadata:
      labels:
        app: booking-service
        version: v1
    spec:
      containers:
        - name: booking-service
          image: booking-service-image:1.0
          ports:
            - containerPort: 8020
---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: istio-microservice
spec:
  type: ClusterIP
  selector:
    app: booking-service
  ports:
    - port: 80
      targetPort: 8020
