apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipping-service
  namespace: istio-microservice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shipping-service
      version: v1
  template:
    metadata:
      labels:
        app: shipping-service
        version: v1
    spec:
      containers:
        - name: shipping-service
          image: shipping-service-image:1.0
          ports:
            - containerPort: 8040
---
apiVersion: v1
kind: Service
metadata:
  name: shipping-service
  namespace: istio-microservice
spec:
  type: ClusterIP
  selector:
    app: shipping-service
  ports:
    - port: 80
      targetPort: 8040
