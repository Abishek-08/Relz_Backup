apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: k6-load-test
  namespace: microservice
spec:
  metrics:
    - name: k6-test
      provider:
        job:
          spec:
            backoffLimit: 0
            template:
              spec:
                restartPolicy: Never
                containers:
                  - name: k6
                    image: grafana/k6
                    command: ["k6", "run", "/scripts/test.js"]
                    volumeMounts:
                      - name: k6-script
                        mountPath: /scripts
                volumes:
                  - name: k6-script
                    configMap:
                      name: k6-script
