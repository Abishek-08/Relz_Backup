apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-script
  namespace: microservice
data:
  test.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';

    export let options = {
      vus: 20,
      duration: '30s',
    };

    export default function () {
      let res = http.get('http://project-service-preview.microservice.svc.cluster.local/projects');
      check(res, { 'status was 200': (r) => r.status === 200 });
      sleep(1);
    }
