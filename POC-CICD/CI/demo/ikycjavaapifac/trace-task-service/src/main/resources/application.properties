spring.application.name=trace-task-service


spring.data.mongodb.uri=mongodb://root:root@my-mongodb.database.svc.cluster.local:27017/cicd_db?authSource=admin


server.port=8082


# Actuator exposure (optional but useful)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# Disable OTLP to avoid the micrometer connection refused noise (unless you run an OTEL collector)
management.otlp.metrics.export.enabled=false

