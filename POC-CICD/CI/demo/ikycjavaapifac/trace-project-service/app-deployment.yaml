apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-service-deployment
  namespace: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-service
  template:
    metadata:
      labels:
        app: project-service
    spec:
      containers:
        - name: project-service
          image: trace-image:1.0
          ports:
            - containerPort: 8081

---
apiVersion: v1
kind: Service
metadata:
  name: project-service-svc
  namespace: demo-app
spec:
  selector:
    app: project-service
  ports:
    - protocol: TCP
      port: 8081
      targetPort: 8081
  type: ClusterIP
