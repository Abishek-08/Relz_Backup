# --- Core service settings ---
spring.application.name=trace-timesheet-service
server.port=8083
# MongoDB
spring.data.mongodb.uri=mongodb://root:root@my-mongodb.database.svc.cluster.local:27017/cicd_db?authSource=admin

# --- Actuator / Metrics ---
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# --- Resilience4j: Retry (Timesheet -> Project) ---
resilience4j.retry.instances.timesheetToProjectRetry.maxAttempts=3
resilience4j.retry.instances.timesheetToProjectRetry.waitDuration=400ms
resilience4j.retry.instances.timesheetToProjectRetry.enableExponentialBackoff=true
resilience4j.retry.instances.timesheetToProjectRetry.exponentialBackoffMultiplier=2.0
# Retry only transient exceptions (timeouts, 5xx)
resilience4j.retry.instances.timesheetToProjectRetry.retryExceptions=java.net.SocketTimeoutException,org.springframework.web.client.ResourceAccessException,org.springframework.web.client.HttpServerErrorException
# Do NOT retry client errors (4xx)
resilience4j.retry.instances.timesheetToProjectRetry.ignoreExceptions=org.springframework.web.client.HttpClientErrorException$BadRequest

# --- Resilience4j: CircuitBreaker (Timesheet -> Project) ---
resilience4j.circuitbreaker.instances.timesheetToProjectCircuit.slidingWindowType=COUNT_BASED
resilience4j.circuitbreaker.instances.timesheetToProjectCircuit.slidingWindowSize=20
resilience4j.circuitbreaker.instances.timesheetToProjectCircuit.minimumNumberOfCalls=10
resilience4j.circuitbreaker.instances.timesheetToProjectCircuit.failureRateThreshold=50
resilience4j.circuitbreaker.instances.timesheetToProjectCircuit.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.timesheetToProjectCircuit.permittedNumberOfCallsInHalfOpenState=5