spring.application.name=trace-task-service


spring.data.mongodb.uri= mongodb://root:root@my-mongodb.database.svc.cluster.local:27017/cicd_db


server.port=8082


# Actuator exposure (optional but useful)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always

# Disable OTLP to avoid the micrometer connection refused noise (unless you run an OTEL collector)
management.otlp.metrics.export.enabled=false


eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.instance.hostname=localhost